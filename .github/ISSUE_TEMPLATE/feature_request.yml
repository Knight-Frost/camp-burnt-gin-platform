name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is your feature request related to a problem?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see
      placeholder: "I would like to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or features?
      placeholder: "I considered..."
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Critical (blocking work)
        - High (significant impact)
        - Medium (nice to have)
        - Low (future consideration)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of the system does this feature relate to?
      options:
        - Authentication/Authorization
        - Camper Management
        - Medical Records (PHI)
        - Applications
        - Reports
        - API
        - Database
        - Documentation
        - CI/CD
        - Other
    validations:
      required: true

  - type: checkboxes
    id: compliance
    attributes:
      label: HIPAA Compliance Considerations
      description: Does this feature involve PHI or medical records?
      options:
        - label: This feature involves Protected Health Information (PHI)
        - label: This feature requires audit logging
        - label: This feature requires additional authorization

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or examples about the feature request
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing feature requests to ensure this is not a duplicate
          required: true
        - label: This feature aligns with the project's goals and scope
          required: true
        - label: I have considered the security and compliance implications
          required: true
