name: CI

on:
  push:
    branches: [ main, backend, develop ]
  pull_request:
    branches: [ main, backend, develop ]

permissions:
  contents: read

jobs:

  repository-governance:
    name: Repository Governance Enforcement
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan repository for forbidden references
        run: |
          echo "Running repository governance scan..."

          FORBIDDEN_PATTERN="Claude|Anthropic|OpenAI|claude.ai|AI-assisted|Co-Authored-By"

          if grep -RniE "$FORBIDDEN_PATTERN" . \
            --exclude-dir=.git \
            --exclude-dir=vendor \
            --exclude-dir=node_modules \
            --exclude-dir=storage \
            --exclude-dir=.github/workflows; then
              echo ""
              echo "ERROR: Forbidden reference detected in repository."
              exit 1
          fi

          echo "Governance check passed."


  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: repository-governance

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: camp_burnt_gin_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql, bcmath, fileinfo
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/camp-burnt-gin-api/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/camp-burnt-gin-api/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        working-directory: backend/camp-burnt-gin-api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Create .env file
        working-directory: backend/camp-burnt-gin-api
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Configure database
        working-directory: backend/camp-burnt-gin-api
        run: php artisan config:clear
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: camp_burnt_gin_test
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Run migrations
        working-directory: backend/camp-burnt-gin-api
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: camp_burnt_gin_test
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Execute tests
        working-directory: backend/camp-burnt-gin-api
        run: php artisan test --parallel
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: camp_burnt_gin_test
          DB_USERNAME: root
          DB_PASSWORD: password
          APP_ENV: testing
          APP_DEBUG: false


  code-style:
    name: Code Style (Laravel Pint)
    runs-on: ubuntu-latest
    needs: repository-governance

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        working-directory: backend/camp-burnt-gin-api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Laravel Pint
        working-directory: backend/camp-burnt-gin-api
        run: ./vendor/bin/pint --test


  static-analysis:
    name: Static Analysis (PHPStan)
    runs-on: ubuntu-latest
    needs: repository-governance

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql, bcmath, fileinfo
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        working-directory: backend/camp-burnt-gin-api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Create .env file
        working-directory: backend/camp-burnt-gin-api
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run PHPStan
        working-directory: backend/camp-burnt-gin-api
        run: ./vendor/bin/phpstan analyse --memory-limit=2G