name: Security

on:
  push:
    branches: [ main, backend, develop ]
  pull_request:
    branches: [ main, backend, develop ]
  schedule:
    # Run security audit daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install dependencies
        working-directory: backend/camp-burnt-gin-api
        run: composer install --no-interaction --prefer-dist

      - name: Run Composer audit
        working-directory: backend/camp-burnt-gin-api
        run: composer audit --format=plain

  license-compliance:
    name: License Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install dependencies
        working-directory: backend/camp-burnt-gin-api
        run: composer install --no-interaction --prefer-dist

      - name: Check licenses
        working-directory: backend/camp-burnt-gin-api
        run: |
          composer licenses --format=json > licenses.json
          cat licenses.json
          # Check for GPL/AGPL licenses that could pose compliance issues
          if grep -q '"GPL"' licenses.json || grep -q '"AGPL"' licenses.json; then
            echo "WARNING: GPL/AGPL licensed dependencies detected"
            grep -E '"GPL|AGPL"' licenses.json || true
          fi

  env-file-check:
    name: Environment File Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for committed .env files
        run: |
          if find . -name ".env" -not -path "*/vendor/*" -not -path "*/.git/*" | grep -q .; then
            echo "ERROR: .env file found in repository!"
            find . -name ".env" -not -path "*/vendor/*" -not -path "*/.git/*"
            exit 1
          fi
          echo "✓ No .env files committed"

      - name: Check for sensitive patterns in code
        run: |
          # Check for potential secrets in code
          PATTERNS=(
            'password.*=.*["\047][^"\047]{8,}'
            'api[_-]?key.*=.*["\047][^"\047]{8,}'
            'secret.*=.*["\047][^"\047]{8,}'
            'token.*=.*["\047][^"\047]{32,}'
            'mysql://[^:]+:[^@]+@'
            'postgres://[^:]+:[^@]+@'
          )

          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            if git grep -iE "$pattern" -- '*.php' '*.js' '*.env.example' ':!vendor' ':!node_modules'; then
              echo "WARNING: Potential secret pattern found: $pattern"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 1 ]; then
            echo "Review flagged patterns above for hardcoded credentials"
            # Don't fail the build, just warn
          fi

  code-security:
    name: Static Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip
          tools: composer:v2

      - name: Install dependencies
        working-directory: backend/camp-burnt-gin-api
        run: composer install --no-interaction --prefer-dist

      - name: Check for known vulnerabilities
        working-directory: backend/camp-burnt-gin-api
        run: |
          # Run security checker if available
          if composer show --locked | grep -q 'enlightn/security-checker'; then
            composer require --dev enlightn/security-checker || true
          fi

      - name: Check PHP code for security issues
        working-directory: backend/camp-burnt-gin-api
        run: |
          # Check for dangerous functions
          echo "Checking for dangerous PHP functions..."
          DANGEROUS_FUNCS=(
            'eval'
            'exec'
            'system'
            'passthru'
            'shell_exec'
            'assert'
            'create_function'
          )

          FOUND=0
          for func in "${DANGEROUS_FUNCS[@]}"; do
            if git grep -n "$func(" -- '*.php' ':!vendor'; then
              echo "WARNING: Dangerous function '$func' found"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 0 ]; then
            echo "✓ No dangerous functions detected"
          fi
