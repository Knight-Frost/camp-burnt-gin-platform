version: 2
updates:
  # Composer dependency updates
  - package-ecosystem: "composer"
    directory: "/backend/camp-burnt-gin-api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - "dependencies"
      - "composer"
      - "security"
    commit-message:
      prefix: "deps"
      include: "scope"
    reviewers:
      - "sirelton"
    ignore:
      # Ignore major version updates for core framework (manual review required)
      - dependency-name: "laravel/framework"
        update-types: ["version-update:semver-major"]

  # GitHub Actions workflow updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
