; supervisord.conf — for bare-server deployments (EC2 without Docker Compose).
; When using docker-compose, the web server and queue worker run as separate
; containers (app + worker services) and this file is NOT used.

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisord]
nodaemon=true
logfile=/var/www/html/storage/logs/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

; Laravel web server
[program:web]
command=php artisan serve --host=0.0.0.0 --port=8000
directory=/var/www/html
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; Queue worker — processes notifications,default queues for email dispatch
; --max-time=3600 recycles the worker hourly to prevent memory leaks
[program:worker]
command=php artisan queue:work --queue=notifications,default --tries=3 --sleep=3 --max-time=3600
directory=/var/www/html
autostart=true
autorestart=true
numprocs=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
