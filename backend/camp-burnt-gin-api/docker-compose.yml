version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: camp-burnt-gin-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_DATABASE:-camp_burnt_gin}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - camp-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PHP Application (Laravel)
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      # Use BUILD_TARGET=development locally; the deploy workflow sets BUILD_TARGET=production
      # via the server .env so this compose file remains usable for both contexts.
      target: ${BUILD_TARGET:-development}
    container_name: camp-burnt-gin-app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=http://localhost:${APP_PORT:-8000}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-camp_burnt_gin}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Variable expansion: reads MAIL_HOST from .env (smtp.gmail.com) when set,
      # falls back to mailpit only when .env has no MAIL_HOST entry.
      - MAIL_HOST=${MAIL_HOST:-mailpit}
      - MAIL_PORT=${MAIL_PORT:-1025}
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_SCHEME=${MAIL_SCHEME:-smtp}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-Camp Burnt Gin}
    volumes:
      - .:/var/www/html
      - php_vendor:/var/www/html/vendor
      - php_storage:/var/www/html/storage
    networks:
      - camp-network
    depends_on:
      mysql:
        condition: service_healthy
    command: sh /var/www/html/docker/entrypoint.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  # Redis (Optional - for cache/sessions)
  redis:
    image: redis:7-alpine
    container_name: camp-burnt-gin-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - camp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Queue worker — processes the "notifications" queue (email dispatch, etc.)
  # Runs php artisan queue:work as a long-lived process separate from the web server.
  # Without this service, SendNotificationJob instances accumulate in the jobs table
  # and email notifications are never dispatched.
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: camp-burnt-gin-worker
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=http://localhost:${APP_PORT:-8000}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-camp_burnt_gin}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - QUEUE_CONNECTION=database
      # Worker uses real mail credentials from .env — does NOT route to Mailpit
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_SCHEME=${MAIL_SCHEME:-smtp}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-Camp Burnt Gin}
    volumes:
      - .:/var/www/html
      - php_vendor:/var/www/html/vendor
      - php_storage:/var/www/html/storage
    networks:
      - camp-network
    depends_on:
      mysql:
        condition: service_healthy
      # Wait for the app container to finish running migrations (healthcheck passes
      # only after the server is up, which means the entrypoint has completed).
      app:
        condition: service_healthy
    # Processes both the "notifications" queue (email jobs) and "default" queue.
    # --max-time=3600 recycles the worker every hour to reclaim memory.
    # --tries=3 and --sleep=3 match SendNotificationJob's own retry configuration.
    command: php artisan queue:work --queue=notifications,default --tries=3 --sleep=3 --max-time=3600

  # Mailpit (Email Testing) — successor to the archived Mailhog project
  mailpit:
    image: axllent/mailpit:latest
    container_name: camp-burnt-gin-mailpit
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"  # SMTP
      - "${MAILHOG_WEB_PORT:-8025}:8025"   # Web UI
    networks:
      - camp-network

networks:
  camp-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  php_vendor:
    driver: local
  php_storage:
    driver: local
